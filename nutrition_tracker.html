<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muscle & Burn — Nutrition Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --card2: #161616;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --text: #f0ede8;
    --muted: #666;
    --muted2: #999;
    --accent: #FF6B35;
    --teal: #4ECDC4;
    --purple: #A855F7;
    --amber: #F59E0B;
    --green: #10B981;
    --red: #EF4444;
    --cal-target: 2750;
    --pro-target: 165;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 32px 24px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
  }
  .header-inner { max-width: 720px; margin: 0 auto; }
  .header-top { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  header .eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1; }
  header h1 span { color: var(--accent); }
  .date-nav { display: flex; align-items: center; gap: 10px; }
  .date-nav button {
    background: var(--card2); border: 1px solid var(--border2);
    color: var(--text); width: 34px; height: 34px; border-radius: 50%;
    cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .date-nav button:hover { background: var(--border2); }
  #dateDisplay { font-size: 13px; font-weight: 600; color: var(--muted2); min-width: 120px; text-align: center; }

  /* MAIN */
  main { max-width: 720px; margin: 0 auto; padding: 20px 24px 80px; }

  /* RINGS */
  .rings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .ring-card {
    background: var(--card); border-radius: 16px; padding: 20px;
    border: 1px solid var(--border); display: flex; align-items: center; gap: 16px;
  }
  .ring-wrap { position: relative; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-val { font-size: 15px; font-weight: 700; line-height: 1; }
  .ring-of { font-size: 9px; color: var(--muted); margin-top: 2px; }
  .ring-info h3 { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .ring-info .ring-remaining { font-size: 13px; font-weight: 600; }
  .ring-info .ring-pct { font-size: 11px; color: var(--muted2); margin-top: 2px; }

  /* QUICK STATS */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border-radius: 12px; padding: 14px 16px;
    border: 1px solid var(--border); text-align: center;
  }
  .stat-card .stat-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .stat-card .stat-val { font-size: 18px; font-weight: 700; }

  /* SECTION TITLE */
  .section-title {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin: 24px 0 10px;
  }

  /* MEAL SLOTS */
  .meal-slot {
    background: var(--card); border-radius: 14px; border: 1px solid var(--border);
    margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s;
  }
  .meal-slot:focus-within { border-color: var(--border2); }
  .meal-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer; user-select: none;
  }
  .meal-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .meal-name { font-weight: 600; font-size: 14px; flex: 1; }
  .meal-time-badge {
    font-size: 10px; color: var(--muted); background: var(--card2);
    padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border2);
  }
  .meal-summary { font-size: 12px; color: var(--muted2); margin-left: auto; padding-right: 8px; }
  .meal-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
  .meal-slot.open .meal-chevron { transform: rotate(180deg); }

  .meal-body { display: none; border-top: 1px solid var(--border); }
  .meal-slot.open .meal-body { display: block; }

  .food-list { padding: 10px 16px 0; }
  .food-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .food-item:last-child { border-bottom: none; }
  .food-item-name { flex: 1; font-size: 13px; }
  .food-item-macros { font-size: 11px; color: var(--muted2); text-align: right; }
  .food-item-macros span { color: var(--green); font-weight: 600; }
  .food-item-del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 14px; padding: 2px 4px; border-radius: 4px; transition: color 0.15s;
    flex-shrink: 0;
  }
  .food-item-del:hover { color: var(--red); }

  /* ADD FOOD FORM */
  .add-food-form {
    padding: 12px 16px 14px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end;
  }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .form-group input {
    background: var(--card2); border: 1px solid var(--border2); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input[type=text] { width: 160px; }
  .form-group input[type=number] { width: 72px; }
  .add-btn {
    background: var(--accent); border: none; color: #000; font-weight: 700;
    font-size: 13px; padding: 8px 16px; border-radius: 8px; cursor: pointer;
    font-family: inherit; transition: opacity 0.15s; align-self: flex-end;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.85; }

  /* PRESET QUICK-ADD */
  .presets { padding: 0 16px 14px; display: flex; flex-wrap: wrap; gap: 6px; }
  .preset-btn {
    background: var(--card2); border: 1px solid var(--border2); color: var(--muted2);
    font-size: 11px; padding: 4px 10px; border-radius: 20px; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* WATER TRACKER */
  .water-card {
    background: var(--card); border-radius: 14px; border: 1px solid var(--border);
    padding: 16px 20px; margin-bottom: 10px;
  }
  .water-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .water-top h3 { font-size: 13px; font-weight: 600; }
  .water-top .water-count { font-size: 13px; font-weight: 700; color: var(--teal); }
  .water-glasses { display: flex; gap: 8px; flex-wrap: wrap; }
  .glass-btn {
    width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid var(--border2);
    background: var(--card2); cursor: pointer; font-size: 16px; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .glass-btn.filled { background: var(--teal); border-color: var(--teal); }

  /* NOTES */
  .notes-card {
    background: var(--card); border-radius: 14px; border: 1px solid var(--border);
    padding: 16px 20px;
  }
  .notes-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .notes-card textarea {
    width: 100%; background: var(--card2); border: 1px solid var(--border2);
    color: var(--text); border-radius: 8px; padding: 10px 12px;
    font-size: 13px; font-family: inherit; resize: vertical; min-height: 72px;
    outline: none; transition: border-color 0.15s;
  }
  .notes-card textarea:focus { border-color: var(--accent); }

  /* STREAK */
  .streak-card {
    background: linear-gradient(135deg, #1a1000, #111);
    border: 1px solid #2a1a00;
    border-radius: 14px; padding: 16px 20px;
    display: flex; align-items: center; gap: 16px; margin-bottom: 10px;
  }
  .streak-fire { font-size: 36px; }
  .streak-info h3 { font-size: 22px; font-weight: 700; color: var(--amber); }
  .streak-info p { font-size: 12px; color: var(--muted2); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--card); border: 1px solid var(--border2); color: var(--text);
    padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 500;
    transition: transform 0.3s; z-index: 99; white-space: nowrap; box-shadow: 0 8px 32px #0008;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    .rings-row { grid-template-columns: 1fr 1fr; }
    .ring-card { padding: 14px; gap: 10px; }
    .stats-row { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .form-group input[type=text] { width: 130px; }
    header h1 { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="eyebrow">Nutrition Tracker</div>
        <h1>Muscle &amp; <span>Burn</span></h1>
      </div>
      <div class="date-nav">
        <button onclick="changeDay(-1)">‹</button>
        <div id="dateDisplay"></div>
        <button onclick="changeDay(1)">›</button>
      </div>
    </div>
  </div>
</header>

<main>

  <!-- RINGS -->
  <div class="rings-row">
    <div class="ring-card">
      <div class="ring-wrap">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle cx="35" cy="35" r="28" fill="none" stroke="#1e1e1e" stroke-width="6"/>
          <circle id="calRing" cx="35" cy="35" r="28" fill="none" stroke="var(--accent)"
            stroke-width="6" stroke-linecap="round"
            stroke-dasharray="175.9" stroke-dashoffset="175.9" style="transition:stroke-dashoffset 0.5s"/>
        </svg>
        <div class="ring-center">
          <div class="ring-val" id="calVal" style="color:var(--accent)">0</div>
          <div class="ring-of">kcal</div>
        </div>
      </div>
      <div class="ring-info">
        <h3>Calories</h3>
        <div class="ring-remaining" id="calRemaining">2750 left</div>
        <div class="ring-pct" id="calPct">Target: 2,750</div>
      </div>
    </div>
    <div class="ring-card">
      <div class="ring-wrap">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle cx="35" cy="35" r="28" fill="none" stroke="#1e1e1e" stroke-width="6"/>
          <circle id="proRing" cx="35" cy="35" r="28" fill="none" stroke="var(--green)"
            stroke-width="6" stroke-linecap="round"
            stroke-dasharray="175.9" stroke-dashoffset="175.9" style="transition:stroke-dashoffset 0.5s"/>
        </svg>
        <div class="ring-center">
          <div class="ring-val" id="proVal" style="color:var(--green)">0g</div>
          <div class="ring-of">protein</div>
        </div>
      </div>
      <div class="ring-info">
        <h3>Protein</h3>
        <div class="ring-remaining" id="proRemaining">165g left</div>
        <div class="ring-pct" id="proPct">Target: 165g</div>
      </div>
    </div>
  </div>

  <!-- QUICK STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Carbs</div>
      <div class="stat-val" id="carbsVal" style="color:var(--amber)">0g</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Fats</div>
      <div class="stat-val" id="fatsVal" style="color:var(--purple)">0g</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Meals</div>
      <div class="stat-val" id="mealsLogged" style="color:var(--teal)">0/5</div>
    </div>
  </div>

  <!-- STREAK -->
  <div class="streak-card">
    <div class="streak-fire">🔥</div>
    <div class="streak-info">
      <h3 id="streakVal">0 days</h3>
      <p>Logging streak — keep it going!</p>
    </div>
  </div>

  <!-- MEALS -->
  <div class="section-title">Today's Meals</div>

  <div id="mealSlots"></div>

  <!-- WATER -->
  <div class="section-title">Hydration</div>
  <div class="water-card">
    <div class="water-top">
      <h3>💧 Water Intake</h3>
      <div class="water-count"><span id="waterCount">0</span> / 10 glasses</div>
    </div>
    <div class="water-glasses" id="waterGlasses"></div>
  </div>

  <!-- NOTES -->
  <div class="section-title">Notes</div>
  <div class="notes-card">
    <h3>📝 Daily Notes</h3>
    <textarea id="notesArea" placeholder="How did you feel today? Any notes about your meals or workout..."></textarea>
  </div>

</main>

<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const CAL_TARGET = 2750;
const PRO_TARGET = 165;

const MEAL_DEFS = [
  { id: 'preworkout', name: 'Pre-Workout',           time: '5:30 AM', color: '#F59E0B' },
  { id: 'breakfast',  name: 'Breakfast (Post-Workout)', time: '7:15 AM', color: '#FF6B35' },
  { id: 'midmorning', name: 'Mid-Morning',            time: '10:30 AM', color: '#4ECDC4' },
  { id: 'lunch',      name: 'Lunch',                  time: '1:30 PM',  color: '#A855F7' },
  { id: 'evening',    name: 'Evening Snack',           time: '4:30 PM',  color: '#F59E0B' },
  { id: 'dinner',     name: 'Dinner',                  time: '7:30 PM',  color: '#10B981' },
];

const PRESETS = {
  preworkout:  [
    { name: 'Banana', cal: 89, pro: 1, carbs: 23, fat: 0 },
    { name: 'Pre-workout', cal: 20, pro: 0, carbs: 5, fat: 0 },
  ],
  breakfast: [
    { name: 'Oats 60g', cal: 228, pro: 8, carbs: 39, fat: 5 },
    { name: 'Low-fat milk 300ml', cal: 111, pro: 10, carbs: 14, fat: 3 },
    { name: 'Peanut butter 1tbsp', cal: 94, pro: 4, carbs: 3, fat: 8 },
    { name: 'Chia seeds 1tsp', cal: 24, pro: 1, carbs: 2, fat: 2 },
    { name: 'Boiled egg x2', cal: 156, pro: 13, carbs: 1, fat: 11 },
    { name: 'Whey protein 1 scoop', cal: 120, pro: 25, carbs: 3, fat: 2 },
  ],
  midmorning: [
    { name: 'Paneer 150g', cal: 375, pro: 28, carbs: 5, fat: 28 },
    { name: 'Apple', cal: 95, pro: 0, carbs: 25, fat: 0 },
    { name: 'Papaya 200g', cal: 78, pro: 1, carbs: 20, fat: 0 },
  ],
  lunch: [
    { name: 'Soya chunks dry 60g', cal: 204, pro: 34, carbs: 20, fat: 1 },
    { name: 'Rice 1 cup cooked', cal: 206, pro: 4, carbs: 45, fat: 0 },
    { name: '2 Rotis', cal: 160, pro: 5, carbs: 30, fat: 3 },
    { name: 'Mixed vegetables', cal: 60, pro: 3, carbs: 12, fat: 0 },
    { name: 'Olive oil 1tsp', cal: 40, pro: 0, carbs: 0, fat: 5 },
  ],
  evening: [
    { name: 'Roasted chana 50g', cal: 180, pro: 11, carbs: 28, fat: 3 },
    { name: 'Low-fat curd 200g', cal: 120, pro: 14, carbs: 9, fat: 3 },
  ],
  dinner: [
    { name: 'Paneer 200g', cal: 500, pro: 36, carbs: 6, fat: 38 },
    { name: 'Tofu 200g', cal: 144, pro: 16, carbs: 4, fat: 9 },
    { name: 'Broccoli + spinach', cal: 55, pro: 5, carbs: 8, fat: 0 },
    { name: 'Ghee 1tsp', cal: 45, pro: 0, carbs: 0, fat: 5 },
  ],
};

// ── STATE ─────────────────────────────────────────────────────────────────
let currentDate = new Date().toISOString().split('T')[0];
let data = {}; // { [date]: { meals: {[mealId]: [{name,cal,pro,carbs,fat}]}, water: 0, notes: '' } }

function getDay(date) {
  if (!data[date]) data[date] = { meals: {}, water: 0, notes: '' };
  return data[date];
}

function save() {
  localStorage.setItem('mb_tracker', JSON.stringify(data));
}

function load() {
  try {
    const s = localStorage.getItem('mb_tracker');
    if (s) data = JSON.parse(s);
  } catch(e) { data = {}; }
}

// ── DATE NAV ──────────────────────────────────────────────────────────────
function changeDay(d) {
  const dt = new Date(currentDate);
  dt.setDate(dt.getDate() + d);
  currentDate = dt.toISOString().split('T')[0];
  renderAll();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (dateStr === today) return 'Today';
  if (dateStr === yesterday) return 'Yesterday';
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

// ── TOTALS ────────────────────────────────────────────────────────────────
function getTotals(date) {
  const day = getDay(date);
  let cal = 0, pro = 0, carbs = 0, fat = 0, meals = 0;
  for (const mId of Object.keys(day.meals)) {
    const items = day.meals[mId] || [];
    if (items.length) meals++;
    for (const item of items) {
      cal   += item.cal   || 0;
      pro   += item.pro   || 0;
      carbs += item.carbs || 0;
      fat   += item.fat   || 0;
    }
  }
  return { cal, pro, carbs, fat, meals };
}

// ── RING UPDATE ───────────────────────────────────────────────────────────
function updateRings() {
  const { cal, pro, carbs, fat, meals } = getTotals(currentDate);
  const calPct  = Math.min(cal / CAL_TARGET, 1);
  const proPct  = Math.min(pro / PRO_TARGET, 1);
  const circ = 175.9;

  document.getElementById('calRing').style.strokeDashoffset = circ - circ * calPct;
  document.getElementById('proRing').style.strokeDashoffset = circ - circ * proPct;

  document.getElementById('calVal').textContent = cal;
  document.getElementById('proVal').textContent = pro + 'g';
  document.getElementById('carbsVal').textContent = carbs + 'g';
  document.getElementById('fatsVal').textContent = fat + 'g';
  document.getElementById('mealsLogged').textContent = meals + '/5';

  const calLeft = CAL_TARGET - cal;
  const proLeft = PRO_TARGET - pro;
  document.getElementById('calRemaining').textContent =
    calLeft > 0 ? calLeft + ' kcal left' : '✅ Target reached!';
  document.getElementById('calRemaining').style.color =
    calLeft <= 0 ? 'var(--green)' : 'var(--text)';
  document.getElementById('proRemaining').textContent =
    proLeft > 0 ? proLeft + 'g left' : '✅ Target reached!';
  document.getElementById('proRemaining').style.color =
    proLeft <= 0 ? 'var(--green)' : 'var(--text)';

  document.getElementById('calPct').textContent =
    'Target: ' + CAL_TARGET.toLocaleString();
  document.getElementById('proPct').textContent =
    'Target: ' + PRO_TARGET + 'g';
}

// ── STREAK ────────────────────────────────────────────────────────────────
function updateStreak() {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const dateStr = d.toISOString().split('T')[0];
    const { cal } = getTotals(dateStr);
    if (cal > 0) streak++;
    else break;
    d.setDate(d.getDate() - 1);
  }
  document.getElementById('streakVal').textContent = streak + (streak === 1 ? ' day' : ' days');
}

// ── WATER ─────────────────────────────────────────────────────────────────
function renderWater() {
  const day = getDay(currentDate);
  const count = day.water || 0;
  document.getElementById('waterCount').textContent = count;
  const container = document.getElementById('waterGlasses');
  container.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'glass-btn' + (i < count ? ' filled' : '');
    btn.textContent = i < count ? '💧' : '○';
    btn.onclick = () => {
      day.water = (i < count) ? i : i + 1;
      save(); renderWater();
    };
    container.appendChild(btn);
  }
}

// ── MEAL SLOTS ────────────────────────────────────────────────────────────
function renderMeals() {
  const container = document.getElementById('mealSlots');
  container.innerHTML = '';
  const day = getDay(currentDate);

  for (const m of MEAL_DEFS) {
    const items = day.meals[m.id] || [];
    const mCal = items.reduce((s, i) => s + (i.cal||0), 0);
    const mPro = items.reduce((s, i) => s + (i.pro||0), 0);

    const slot = document.createElement('div');
    slot.className = 'meal-slot';
    slot.id = 'slot-' + m.id;

    // header
    const hdr = document.createElement('div');
    hdr.className = 'meal-header';
    hdr.innerHTML = `
      <div class="meal-dot" style="background:${m.color}"></div>
      <div class="meal-name">${m.name}</div>
      <div class="meal-time-badge">${m.time}</div>
      <div class="meal-summary" id="summary-${m.id}">${items.length ? mCal + ' kcal · ' + mPro + 'g pro' : ''}</div>
      <div class="meal-chevron">▼</div>
    `;
    hdr.onclick = () => slot.classList.toggle('open');
    slot.appendChild(hdr);

    // body
    const body = document.createElement('div');
    body.className = 'meal-body';

    // food list
    const list = document.createElement('div');
    list.className = 'food-list';
    list.id = 'list-' + m.id;
    renderFoodList(list, m.id, items, m.color);
    body.appendChild(list);

    // add food form
    const form = document.createElement('div');
    form.className = 'add-food-form';
    form.innerHTML = `
      <div class="form-group">
        <label>Food</label>
        <input type="text" id="fname-${m.id}" placeholder="e.g. Chicken breast">
      </div>
      <div class="form-group">
        <label>Kcal</label>
        <input type="number" id="fcal-${m.id}" placeholder="200" min="0">
      </div>
      <div class="form-group">
        <label>Protein (g)</label>
        <input type="number" id="fpro-${m.id}" placeholder="25" min="0">
      </div>
      <div class="form-group">
        <label>Carbs (g)</label>
        <input type="number" id="fcarb-${m.id}" placeholder="10" min="0">
      </div>
      <div class="form-group">
        <label>Fat (g)</label>
        <input type="number" id="ffat-${m.id}" placeholder="5" min="0">
      </div>
      <button class="add-btn" onclick="addFood('${m.id}')">+ Add</button>
    `;
    body.appendChild(form);

    // presets
    const presets = PRESETS[m.id] || [];
    if (presets.length) {
      const presetRow = document.createElement('div');
      presetRow.className = 'presets';
      for (const p of presets) {
        const btn = document.createElement('button');
        btn.className = 'preset-btn';
        btn.textContent = p.name;
        btn.onclick = () => quickAdd(m.id, p);
        presetRow.appendChild(btn);
      }
      body.appendChild(presetRow);
    }

    slot.appendChild(body);
    container.appendChild(slot);
  }
}

function renderFoodList(container, mealId, items, color) {
  container.innerHTML = '';
  if (!items.length) return;
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const div = document.createElement('div');
    div.className = 'food-item';
    div.innerHTML = `
      <div class="food-item-name">${item.name}</div>
      <div class="food-item-macros">${item.cal} kcal · <span>${item.pro}g</span> pro</div>
      <button class="food-item-del" onclick="removeFood('${mealId}', ${i})">✕</button>
    `;
    container.appendChild(div);
  }
}

function addFood(mealId) {
  const name  = document.getElementById('fname-' + mealId).value.trim();
  const cal   = parseInt(document.getElementById('fcal-' + mealId).value)  || 0;
  const pro   = parseInt(document.getElementById('fpro-' + mealId).value)  || 0;
  const carbs = parseInt(document.getElementById('fcarb-' + mealId).value) || 0;
  const fat   = parseInt(document.getElementById('ffat-' + mealId).value)  || 0;
  if (!name) { toast('Please enter a food name'); return; }

  const day = getDay(currentDate);
  if (!day.meals[mealId]) day.meals[mealId] = [];
  day.meals[mealId].push({ name, cal, pro, carbs, fat });
  save();

  document.getElementById('fname-' + mealId).value = '';
  document.getElementById('fcal-'  + mealId).value = '';
  document.getElementById('fpro-'  + mealId).value = '';
  document.getElementById('fcarb-' + mealId).value = '';
  document.getElementById('ffat-'  + mealId).value = '';

  refreshMeal(mealId);
  updateRings();
  updateStreak();
  toast('Added: ' + name);
}

function quickAdd(mealId, preset) {
  const day = getDay(currentDate);
  if (!day.meals[mealId]) day.meals[mealId] = [];
  day.meals[mealId].push({ ...preset });
  save();
  refreshMeal(mealId);
  updateRings();
  updateStreak();
  toast('Added: ' + preset.name);
}

function removeFood(mealId, idx) {
  const day = getDay(currentDate);
  day.meals[mealId].splice(idx, 1);
  save();
  refreshMeal(mealId);
  updateRings();
}

function refreshMeal(mealId) {
  const day = getDay(currentDate);
  const items = day.meals[mealId] || [];
  const mCal = items.reduce((s, i) => s + (i.cal||0), 0);
  const mPro = items.reduce((s, i) => s + (i.pro||0), 0);
  const summary = document.getElementById('summary-' + mealId);
  if (summary) summary.textContent = items.length ? mCal + ' kcal · ' + mPro + 'g pro' : '';
  const list = document.getElementById('list-' + mealId);
  const mDef = MEAL_DEFS.find(m => m.id === mealId);
  if (list && mDef) renderFoodList(list, mealId, items, mDef.color);
}

// ── NOTES ─────────────────────────────────────────────────────────────────
function initNotes() {
  const ta = document.getElementById('notesArea');
  const day = getDay(currentDate);
  ta.value = day.notes || '';
  ta.oninput = () => {
    getDay(currentDate).notes = ta.value;
    save();
  };
}

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── RENDER ALL ────────────────────────────────────────────────────────────
function renderAll() {
  document.getElementById('dateDisplay').textContent = formatDate(currentDate);
  renderMeals();
  renderWater();
  updateRings();
  updateStreak();
  initNotes();
}

// ── INIT ──────────────────────────────────────────────────────────────────
load();
renderAll();
</script>
</body>
</html>
